<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام محل الخضار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-logo">🥦</div>
        <div class="auth-title">نظام محل الخضار والفواكه</div>
        <div class="auth-sub">إدارة متكاملة لمحلك التجاري</div>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">تسجيل الدخول</button>
            <button class="auth-tab" data-tab="register">حساب جديد</button>
        </div>
        <div class="auth-err" id="auth-err"></div>
        <div id="login-form">
            <div class="auth-field"><label>البريد الإلكتروني</label><input type="email" id="login-email" placeholder="example@email.com"></div>
            <div class="auth-field"><label>كلمة المرور</label><input type="password" id="login-pass" placeholder="••••••••"></div>
            <button class="auth-btn" id="login-btn">🔑 دخول</button>
        </div>
        <div id="register-form" style="display:none;">
            <div class="auth-field"><label>اسم المحل</label><input type="text" id="reg-shop" placeholder="مثال: محل أبو أحمد"></div>
            <div class="auth-field"><label>البريد الإلكتروني</label><input type="email" id="reg-email" placeholder="example@email.com"></div>
            <div class="auth-field"><label>كلمة المرور</label><input type="password" id="reg-pass" placeholder="٨ أحرف على الأقل"></div>
            <div class="auth-field"><label>تأكيد كلمة المرور</label><input type="password" id="reg-pass2" placeholder="••••••••"></div>
            <button class="auth-btn" id="reg-btn">✅ إنشاء حساب مجاني (١٤ يوم)</button>
            <p style="text-align:center;font-size:0.78rem;color:var(--gray);margin-top:10px;">تجربة مجانية ١٤ يوم — لا يلزم بطاقة بنكية</p>
        </div>
    </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
